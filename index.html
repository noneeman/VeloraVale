<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velora & Vale — October 3, 2026 · Rhinebeck, Hudson Valley</title>
    <meta
      name="description"
      content="Velora and Vale welcome you on Saturday, October 3, 2026 at Riverstone Estate, Rhinebeck. RSVP by September 1, schedule, travel, and guest details."
    />
    <meta name="theme-color" content="#faf8f5" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              ink: "#1c1917",
              mist: "#faf8f5",
              paper: "#f3f0ea",
              stone: "#78716c",
              clay: "#a8a29e",
              line: "#e7e2d9",
              accent: "#5c5347",
              accentsoft: "#8a7f72",
            },
            fontFamily: {
              display: ["Cormorant Garamond", "Georgia", "serif"],
              sans: ["DM Sans", "system-ui", "sans-serif"],
            },
            letterSpacing: {
              cap: "0.22em",
            },
            maxWidth: {
              measure: "38rem",
              content: "72rem",
            },
          },
        },
      };
    </script>
    <style>
      @media (prefers-reduced-motion: reduce) {
        html {
          scroll-behavior: auto !important;
        }
        [data-reveal] {
          opacity: 1 !important;
          transform: none !important;
          transition: none !important;
        }
      }
      [data-reveal] {
        opacity: 0;
        transform: translateY(12px);
        transition: opacity 0.65s ease, transform 0.65s ease;
      }
      [data-reveal].is-visible {
        opacity: 1;
        transform: translateY(0);
      }
      .faq-toggle-icon {
        display: inline-block;
        transition: transform 0.2s ease;
      }
      [data-faq-button][aria-expanded="true"] .faq-toggle-icon {
        transform: rotate(45deg);
      }
    </style>
  </head>
  <body class="bg-mist font-sans text-ink text-[15px] leading-relaxed antialiased">
    <a
      href="#main"
      class="sr-only focus:not-sr-only focus:absolute focus:left-4 focus:top-4 focus:z-[100] focus:rounded focus:bg-ink focus:px-4 focus:py-2 focus:text-mist focus:outline-none focus-visible:ring-2 focus-visible:ring-mist/80 focus-visible:ring-offset-2 focus-visible:ring-offset-ink"
      >Skip to content</a
    >

    <header data-site-header class="sticky top-0 z-50 border-b border-line/80 bg-mist">
      <div
        class="mx-auto flex max-w-content items-center justify-between gap-4 px-5 py-4 md:px-8 lg:px-12"
      >
        <a href="#top" class="group rounded-md font-display text-xl font-medium tracking-tight text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 focus-visible:ring-offset-2 focus-visible:ring-offset-mist md:text-2xl">
          Velora <span class="text-clay">&</span> Vale
        </a>

        <nav class="hidden items-center gap-6 text-[13px] font-medium uppercase tracking-cap text-stone md:flex lg:gap-8" aria-label="Primary">
          <a class="rounded-md px-1 py-2 transition-colors hover:text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 focus-visible:ring-offset-2 focus-visible:ring-offset-mist" href="#story">Our story</a>
          <a class="rounded-md px-1 py-2 transition-colors hover:text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 focus-visible:ring-offset-2 focus-visible:ring-offset-mist" href="#schedule">Schedule</a>
          <a class="rounded-md px-1 py-2 transition-colors hover:text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 focus-visible:ring-offset-2 focus-visible:ring-offset-mist" href="#venue">Venue &amp; travel</a>
          <a class="rounded-md px-1 py-2 transition-colors hover:text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 focus-visible:ring-offset-2 focus-visible:ring-offset-mist" href="#gallery">Gallery</a>
          <a class="rounded-md px-1 py-2 transition-colors hover:text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 focus-visible:ring-offset-2 focus-visible:ring-offset-mist" href="#registry">Registry</a>
          <a class="rounded-md px-1 py-2 transition-colors hover:text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 focus-visible:ring-offset-2 focus-visible:ring-offset-mist" href="#faq">FAQ</a>
          <a
            class="rounded-full border border-ink/15 bg-ink px-5 py-2.5 text-mist transition-colors hover:bg-accent focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/60 focus-visible:ring-offset-2 focus-visible:ring-offset-mist"
            href="#rsvp"
            >RSVP</a
          >
        </nav>

        <button
          type="button"
          class="inline-flex h-11 min-h-[44px] w-11 min-w-[44px] items-center justify-center rounded-full border border-line text-ink transition-colors hover:border-clay hover:text-accent focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 focus-visible:ring-offset-2 focus-visible:ring-offset-mist md:hidden"
          data-nav-toggle
          aria-expanded="false"
          aria-controls="mobile-nav"
          aria-label="Open menu"
        >
          <span class="sr-only">Menu</span>
          <svg width="18" height="14" viewBox="0 0 18 14" fill="none" aria-hidden="true">
            <path d="M1 1h16M1 7h16M1 13h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
          </svg>
        </button>
      </div>

      <div
        id="mobile-nav"
        data-nav-panel
        class="hidden border-t border-line bg-mist px-5 py-6 md:hidden"
        aria-hidden="true"
      >
        <nav class="flex flex-col gap-1 text-sm font-medium uppercase tracking-cap text-stone" aria-label="Mobile">
          <a data-nav-link class="rounded-md px-1 py-3 transition-colors hover:text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 focus-visible:ring-offset-2 focus-visible:ring-offset-mist" href="#story">Our story</a>
          <a data-nav-link class="rounded-md px-1 py-3 transition-colors hover:text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 focus-visible:ring-offset-2 focus-visible:ring-offset-mist" href="#schedule">Schedule</a>
          <a data-nav-link class="rounded-md px-1 py-3 transition-colors hover:text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 focus-visible:ring-offset-2 focus-visible:ring-offset-mist" href="#venue">Venue &amp; travel</a>
          <a data-nav-link class="rounded-md px-1 py-3 transition-colors hover:text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 focus-visible:ring-offset-2 focus-visible:ring-offset-mist" href="#rsvp">RSVP</a>
          <a data-nav-link class="rounded-md px-1 py-3 transition-colors hover:text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 focus-visible:ring-offset-2 focus-visible:ring-offset-mist" href="#gallery">Gallery</a>
          <a data-nav-link class="rounded-md px-1 py-3 transition-colors hover:text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 focus-visible:ring-offset-2 focus-visible:ring-offset-mist" href="#registry">Registry</a>
          <a data-nav-link class="rounded-md px-1 py-3 transition-colors hover:text-ink focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-accent/45 focus-visible:ring-offset-2 focus-visible:ring-offset-mist" href="#faq">FAQ</a>
        </nav>
      </div>
    </header>

    <main id="main">
    </main>

    <script src="main.js" defer></script>
  </body>
</html>
